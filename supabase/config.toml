# supabase/config.toml
# Local Supabase development configuration
# Run: supabase start

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# Max file size in bytes (50MB)
file_size_limit = "50MiB"

[auth]
enabled = true
# Disable sign-ups — admin-only system
enable_signup = false
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/admin"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.email]
enable_signup = false
enable_confirmations = false

[functions]
# Edge Functions config
verify_jwt = false  # Allow anon calls to download-tool function
